---
- name: Ensure firewalld is running and enabled
  tags: firewall
  ansible.builtin.service:
    name: firewalld
    state: started
    enabled: true

- name: Allow required services through firewall
  tags: firewall
  ansible.posix.firewalld:
    zone: "{{ hardening_firewall_zone }}"
    service: "{{ item }}"
    permanent: true
    immediate: true
    state: enabled
  loop: "{{ hardening_firewall_services_allowed }}"
  notify: Reload firewalld

- name: Removed disallowed services from firewall 
  tags: firewall
  ansible.posix.firewalld:
    zone: "{{ hardening_firewall_zone }}"
    service: "{{ item }}"
    permanent: true
    immediate: true
    state: disabled
  loop: "{{ hardening_firewall_services_blocked }}"
  notify: Reload firewalld

# ---- SELinux

- name: Set SELinux mode
  tags: selinux
  ansible.posix.selinux:
    state: "{{ hardening_selinux_state }}"
    policy: "{{ hardening_selinux_policy }}"
  register: selinux_result

- name: Reboot if SELinux mode changed
  tags: selinux
  ansible.builtin.reboot:
    msg: "Rebooting to apply SELinux mode change"
    reboot_timeout: 300
  when: selinux_result.reboot_required | default(false)

- name: Set SELinux booleans
  tags: selinux
  ansible.posix.seboolean:
    name: "{{ item.name }}"
    state: "{{ item.state }}"
    persistent: true
  loop: "{{ hardening_selinux_booleans }}"

  # ---- Fail2Ban

- name: Import EPEL 9 GPG Key
  tags: fail2ban
  ansible.builtin.rpm_key:
    key: "{{ hardening_epel_gpg_key }}"
    state: present

- name: Install EPEL repository
  tags: fail2ban
  ansible.builtin.dnf:
    name: "{{ hardening_epel_rpm }}"
    state: present 
    disable_gpg_check: false

- name: Install fail2ban packages
  tags: fail2ban
  ansible.builtin.dnf:
    name: "{{ hardening_packages | reject('equalto', 'epel-release') | list }}"
    state: present

- name: Deploy fail2ban jail configuration
  tags: fail2ban
  ansible.builtin.template:
    src: hardening.conf.j2
    dest: "{{ hardening_fail2ban_jail_config }}"
    owner: root
    group: root
    mode: "0644"
  notify: Restart fail2ban

- name: Enable and start fail2ban
  tags: fail2ban
  ansible.builtin.service:
    name: fail2ban
    state: started
    enabled: true


